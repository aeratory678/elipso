<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device width, initial-scale=1.0"
        <title>fractals</title>
        <style>
            body {
                margin: 0;
                overflow: hidden;
                background-color: #000000;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }
            canvas {
                display: block;
            }
            #warning-screen {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: #0a0a0a;
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 10;
                transition: opacity 0.8s ease-out, visiblity 0.8s;
                padding: 20px;
                box-sizing: border-box;
            }
            .warning-content {
                max-width: 500px;
                text-align: center;
                color: #ffffff;
            }
            .warning-title {
                color: #ff3333;
                font-size: 1.8rem;
                font-weight: 700;
                letter-spacing: 2px;
                text-transform: lowercase;
                margin-bottom: 20px;
            }
            .warning-text {
                font-size: 1rem;
                line-height: 1.6;
                color: #cccccc;
                margin-bottom: 30px;
            }
            .start-btn {
                background-color: #ffffff;
                color: #000000;
                border: none;
                padding: 12px 30px;
                font-size: 1rem;
                font-weight: 600;
                text-transform: lowercase;
                cursor: pointer;
                letter-spacing: 1px;
                transition: background-color 0.2s, transform 0.1s;
            }
            .start-btn:hover {
                background-color: #dddddd;
            }
            .start-btn:active {
                transform: scale(0.98);
            }
        </style>
    </head>
    <body>
        <div id="warning-screen">
            <div class="warning-content">
                <div class="warning-title">Epilepsy Warning</div>
                <p class="warning-text">
                    before you see this: please be aware that this visualisation contains fast-moving geometric patterns and shifting colors.
                    <br><br>
                    viewer discretion is advised for individuals prone to photosensitive epilepsy, vertigo or motion sickness.
                </p>
                <button class="start-btn" id="startBtn">proceed to fractals</button>
            </div>
        </div>
        <canvas id="fractalCanvas"></canvas>
        <script>
            const canvas = document.getElementById('fractalCanvas');
            const ctx = canvas.getContext('2d');
            const warningScreen = document.getElementById('warning-screen');
            const startBtn = document.getElementById('startBtn')
            let mouseX = 0.5;
            let mouseY = 0.5;
            let targetMouseX = 0.5;
            let targetMouseY = 0.5;
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();
            window.addEventListener('mousemove', (e) => {
                targetMouseX = e.clientX / window.innerWidth;
                targetMouseY = e.clientY / window.innerHeight;
            });
            let animationFrame = 0;
            let startFractal = false;
            const initialScaleFactor = 0.7; // Define initial scale factor here
            startBtn.addEventListener('click', () => {
                warningScreen.style.opacity = '0';
                warningScreen.style.visibility = 'hidden';
                startFractal= true;
                animate();
            });

            function drawHypnoticCircle(x, y, radius, depth, maxDepth, angleOffset, scaleFactor) {
                if (depth > maxDepth) return;
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                const hue = (depth * 40 + animationFrame * 2) % 360;
                ctx.strokeStyle = `hsla(${hue}, 80%, 60%, ${1 - depth / maxDepth})`;
                ctx.lineWidth = 1.5;
                ctx.stroke();
                if (radius < 2) return;
                const branches = 3;
                const nextRadius = radius * scaleFactor;
                for (let i = 0; i < branches; i++) {
                    const angle = (i * (Math.PI * 2) / branches) + angleOffset;
                    const nextX = x + Math.cos(angle) * (radius - nextRadius);
                    const nextY = y + Math.sin(angle) * (radius - nextRadius);
                    drawHypnoticCircle(nextX, nextY, nextRadius, depth + 1, maxDepth, -angleOffset * 1.2, scaleFactor);
                }
            }
            function animate() {
                if (!startFractal) return;
                mouseX += (targetMouseX - mouseX) * 0.08;
                mouseY += (targetMouseY - mouseY) * 0.08;
                ctx.fillStyle = 'rgba(5, 5, 5, 0.3)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                const centerX = canvas.width /2;
                const centerY = canvas.height / 2;
                const baseRadius = Math.min(canvas.width, canvas.height) * 0.4;
                animationFrame++;
                const rotationSpeed = (animationFrame * 0.005) + (mouseY * 4);
                const dynamicScale = 0.35 + (mouseX * 0.2);
                drawHypnoticCircle(centerX, centerY, baseRadius, 0, 5, rotationSpeed, dynamicScale);
                requestAnimationFrame(animate); 
            }

        </script>   
    </body>
</html>
